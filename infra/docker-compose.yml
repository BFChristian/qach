services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: qach-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: qach
      POSTGRES_PASSWORD: qach
      POSTGRES_DB: qach
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qach -d qach"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
